<html>

        <meta charset="utf-8">
        <meta lang="en">
    </head>

    <body>
        <h1>This is an unordered list</h1>
            <ul>
                <li>This is item 1</li>
                <li>This is item 2</li>
                <li>This is item 3</li>
            </ul>
        <h2>This is an ordered list</h2>
            <ol>
                <li>This is item 1</li>
                <li>This is item 2</li>
                <li>This is item 3</li>
            </ol>

    </body>
</html>
